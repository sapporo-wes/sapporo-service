# Sapporo spawns sub-containers via Docker socket (DinD).
# Sub-container volume mounts are resolved on the HOST, not inside this container.
# Therefore, SAPPORO_RUN_DIR uses ${PWD} (host absolute path) and mounts
# host-path:host-path so that paths are identical on both sides.

services:
  app:
    image: ghcr.io/sapporo-wes/sapporo-service:${SAPPORO_VERSION:-latest}
    container_name: sapporo-service
    environment:
      - SAPPORO_HOST=0.0.0.0
      - SAPPORO_PORT=1122
      - SAPPORO_DEBUG=False
      - SAPPORO_RUN_DIR=${PWD}/runs
      # Extra volume mounts passed to inner workflow containers (space-separated docker run flags).
      # On EC2, set this to mount the data directory, e.g.:
      #   SAPPORO_EXTRA_DOCKER_ARGS=-v /data:/data
      - SAPPORO_EXTRA_DOCKER_ARGS=-v /Users/inutano/work/wes-test/wes-interop-demo:/Users/inutano/work/wes-test/wes-interop-demo
    volumes:
      - ${PWD}/runs:${PWD}/runs:rw
      - ${PWD}/sapporo/run.sh:/app/sapporo/run.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 127.0.0.1:1122:1122
    working_dir: /app
    command: ["sapporo"]
    networks:
      - sapporo-network
    init: true

networks:
  sapporo-network:
    name: sapporo-network
